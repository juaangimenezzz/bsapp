<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="BSAPP — Gestiona tu barbería: citas, horarios y servicios en un solo lugar" />
    <meta name="application-name" content="BSAPP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="BSAPP" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Iconos Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="%PUBLIC_URL%/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="%PUBLIC_URL%/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="%PUBLIC_URL%/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icon-144x144.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>BSAPP</title>
  </head>
  <body>
    <noscript>Necesitas activar JavaScript para usar esta aplicación.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(reg) {
              console.log('Service Worker registrado:', reg.scope);
            })
            .catch(function(err) {
              console.log('Error al registrar Service Worker:', err);
            });
        });
      }
    </script>
  </body>
